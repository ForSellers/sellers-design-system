name: Auto PR dev → main

on:
  push:
    branches: [dev]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT necessário em repos privados para disparar pull_request
          # events nos outros workflows (GITHUB_TOKEN não consegue)
          token: ${{ secrets.GH_PAT }}

      - name: Criar PR dev → main (se não existir)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "chore: sync dev → main" \
              --body "$(cat <<'EOF'
          ## PR automática — dev → main

          Gerada automaticamente após push na branch **dev**.

          Revise as alterações e faça merge quando estiver pronto para publicar em produção.

          > Deploy em produção ocorre automaticamente após merge em main (GitHub Pages).
          EOF
          )"
            echo "PR criada com sucesso"
          else
            echo "PR #$EXISTING já existe para dev → main, nenhuma ação necessária"
          fi
